<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Form</title>
</head>

<body>
    <section id="FORM">
        <h2>Book Your Stay:</h2>
        <form action="submit_form.php" method="post">
            <label for="name">Name:</label><br><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label><br><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="would you like to recieve notifications?">Would you like to receive
                notifications?</label><br><br>
            <select id="notifications" name="notifications" value="notifications" required>
                <option value="yes">Yes, I would like to receive notifications.</option>
                <option value="no">No, thank you.</option>
            </select><br><br>

            <label for="Check-in date">Check-in date:</label><br><br>
            <input type="date" id="check-in" name="check-in" required><br><br>
            <label for="Check-out date">Check-out date:</label><br><br>
            <input type="date" id="check-out" name="check-out" required><br><br>

            <label for="number of guests">Number of guests:</label><br><br>
            <input type="number" id="guests" name="guests" min="1" max="6" required><br><br>

            <label for="Reason for booking">Reason for booking:</label><br><br>
            <select id="reason" name="reason" value="reason" required>
                <option value="leisure">Leisure</option>
                <option value="business">Business</option>
                <option value="other">Other</option>
            </select><br><br>

            <input type="submit" value="Register">


</body>

</html>
